name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            package: unix
          - name: Linux ARM64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            package: unix
            cross: true
          - name: macOS Intel
            target: x86_64-apple-darwin
            runner: macos-15-intel
            package: unix
          - name: macOS Apple Silicon
            target: aarch64-apple-darwin
            runner: macos-latest
            package: unix
          - name: Windows x64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            package: windows

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cargo
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build with cross
        if: ${{ matrix.cross }}
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package Unix release assets
        if: ${{ matrix.package == 'unix' }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          .github/scripts/package-unix.sh "${{ matrix.target }}" "$VERSION"

      - name: Package Windows release assets
        if: ${{ matrix.package == 'windows' }}
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          .github/scripts/package-windows.ps1 -Target "${{ matrix.target }}" -Version $version

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS

      - name: Extract release notes
        shell: bash
        run: |
          .github/scripts/extract-release-notes.sh "${GITHUB_REF_NAME}" > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: artifacts/*
          generate_release_notes: false
