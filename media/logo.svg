<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">ipatool-rs</title>
  <desc id="desc">A dark terminal-inspired logo for ipatool-rs.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1728"/>
      <stop offset="1" stop-color="#101a2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58f3b3"/>
      <stop offset="0.52" stop-color="#46c7ff"/>
      <stop offset="1" stop-color="#8aa4ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="932" height="212" rx="34" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="37" y="37" width="906" height="186" rx="26" fill="none" stroke="#22324d" stroke-width="2"/>

  <g transform="translate(76 57)">
    <rect width="112" height="146" rx="24" fill="#111e31" stroke="url(#accent)" stroke-width="4"/>
    <rect x="16" y="20" width="80" height="104" rx="12" fill="#07111f" stroke="#293c5c"/>
    <circle cx="56" cy="134" r="5" fill="#58f3b3"/>
    <text x="28" y="55" fill="#58f3b3" font-size="18" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace">$</text>
    <rect x="48" y="42" width="31" height="6" rx="3" fill="#46c7ff"/>
    <rect x="28" y="70" width="51" height="6" rx="3" fill="#8aa4ff" opacity="0.85"/>
    <rect x="28" y="88" width="36" height="6" rx="3" fill="#58f3b3" opacity="0.85"/>
  </g>

  <g font-family="SFMono-Regular,Consolas,Liberation Mono,monospace">
    <text x="228" y="128" font-size="84" font-weight="800" fill="#eef5ff" letter-spacing="1">ipatool</text>
    <text x="628" y="128" font-size="84" font-weight="800" fill="url(#accent)" letter-spacing="1">-rs</text>
    <text x="232" y="168" font-size="25" fill="#9fb1c8">App Store IPA downloads in your terminal</text>
    <g transform="translate(232 189)">
      <rect width="303" height="30" rx="15" fill="#07111f" stroke="#22324d"/>
      <text x="18" y="21" font-size="16" fill="#58f3b3">ipatool</text>
      <text x="92" y="21" font-size="16" fill="#8aa4ff">search</text>
      <text x="160" y="21" font-size="16" fill="#e8f0ff">download</text>
      <rect x="270" y="9" width="12" height="12" rx="2" fill="#46c7ff"/>
    </g>
  </g>
</svg>
